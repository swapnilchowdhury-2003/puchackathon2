<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login - PUCC</title>
    <style>
        body { background-color: #050505; color: #e0e0e0; font-family: sans-serif; margin: 0; }
        .container { max-width: 500px; margin: 100px auto; padding: 40px; background: #111; border-radius: 12px; border: 1px solid #333; text-align: center; }
        input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 5px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; }
        .btn { padding: 12px 30px; background: #0056b3; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1rem; }
        #dashboard { display: none; }
        /* Include same Header/Footer styles here */
    </style>
    <link rel="stylesheet" href="responsive.css">
</head>
<body>
    <div id="login-box" class="container">
        <h1>Member Login</h1>
        <input type="password" id="pass" placeholder="Enter Password (2468)">
        <button class="btn" onclick="checkPass()">Login</button>
    </div>

    <div id="dashboard" class="container">
        <h1>Member Dashboard</h1>
        <div class="info-box" style="background: #1a1a1a; padding: 20px; border-radius: 8px; text-align: left;">
            <p><strong>Name:</strong> Mohammad Sadek</p>
            <p><strong>Status:</strong> <span style="color: #28a745;">Active Member</span></p>
        </div>
        <a href="events.html" class="btn">View Upcoming Events</a>
    </div>

    <script>
        function checkPass() {
            if(document.getElementById("pass").value === "2468") {
                document.getElementById("login-box").style.display = "none";
                document.getElementById("dashboard").style.display = "block";
            } else {
                alert("Wrong Password!");
            }
        }
    </script>
</body>
</html>
